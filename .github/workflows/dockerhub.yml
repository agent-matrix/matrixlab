name: 📦 Publish Docker (Docker Hub)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g., v1.2.3 or 1.2.3)"
        required: true
  push:
    branches: [master, main]
    # Only rebuild when something that ends up in an image changes.
    # Docs / READMEs / Makefile-only commits don't burn CI time.
    paths:
      - "runner/**"
      - "sandbox-build/**"
      - "sandbox-dotnet/**"
      - "sandbox-go/**"
      - "sandbox-java/**"
      - "sandbox-node/**"
      - "sandbox-python/**"
      - "sandbox-rust/**"
      - "sandbox-utils/**"
      - ".github/workflows/dockerhub.yml"

permissions:
  contents: read

concurrency:
  group: dockerhub-publish
  cancel-in-progress: true

jobs:
  build-runner:
    name: Build & Push Runner (Docker Hub)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Normalize version from release tag or manual input
      - name: Derive release version
        id: version
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            release)
              RAW="${GITHUB_REF#refs/tags/}"
              ;;
            workflow_dispatch)
              RAW="${{ github.event.inputs.version }}"
              ;;
            push)
              # On every commit to master/main, ship a snapshot tagged
              # 0.0.0-<branch>-<sha>. Real releases / dispatches still
              # use a proper semver and move :latest.
              BRANCH="${GITHUB_REF#refs/heads/}"
              RAW="0.0.0-${BRANCH}-${GITHUB_SHA::7}"
              ;;
            *)
              RAW=""
              ;;
          esac
          if [ -z "$RAW" ]; then
            echo "Version not provided."; exit 1
          fi
          if [[ "$RAW" =~ ^v ]]; then
            RELEASE_TAG="$RAW"
            SEMVER="${RAW#v}"
          else
            RELEASE_TAG="v$RAW"
            SEMVER="$RAW"
          fi
          # Branch name (for push-only branch tag). Empty for non-push.
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "SEMVER=$SEMVER" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "Resolved RELEASE_TAG=${RELEASE_TAG}, SEMVER=${SEMVER}, SHORT_SHA=${SHORT_SHA}"

      # docker.io requires lowercase namespace
      - name: Compute image name (lowercase)
        id: img
        shell: bash
        run: |
          USER_RAW="${{ secrets.DOCKERHUB_USERNAME }}"
          USER_LC="${USER_RAW,,}"
          IMAGE="docker.io/${USER_LC}/matrixlab-runner"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "Image: $IMAGE"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            # release / manual dispatch: clean semver tags + latest
            type=raw,value=v${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{version}},value=${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{major}},value=${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            # always: short-sha so any build is reproducibly addressable
            type=raw,value=sha-${{ env.SHORT_SHA }}
            # push only: branch tag (e.g. master) + edge alias for the head of default
            type=raw,value=${{ env.BRANCH }},enable=${{ github.event_name == 'push' }}
            type=raw,value=edge,enable=${{ github.event_name == 'push' && (env.BRANCH == 'master' || env.BRANCH == 'main') }}
          labels: |
            org.opencontainers.image.title=matrixlab-runner
            org.opencontainers.image.description=MatrixLab Runner — HTTP service that dispatches code into per-language sandbox containers
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.SEMVER }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}

      - name: Build & push runner (Docker Hub)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./runner
          file: ./runner/Dockerfile
          push: true
          platforms: ${{ github.event_name == 'push' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner
          build-args: |
            BUILD_VERSION=${{ env.SEMVER }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      # Sanity guard: the runner must boot and answer /health.
      # /var/run/docker.sock is mounted because runner_preflight() in
      # app/sandbox.py refuses to start without it — the runner needs
      # the host docker socket to spawn per-language sandbox containers.
      # Use the sha-prefixed tag (always present on every event type)
      # rather than v${SEMVER} (which only exists on release / dispatch).
      - name: Smoke test — runner /health
        shell: bash
        run: |
          REF="${IMAGE}:sha-${SHORT_SHA}"
          docker run -d --name matrixlab-runner-smoke \
            -p 8000:8000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$REF"
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "OK: /health responded"
              docker stop matrixlab-runner-smoke
              docker rm matrixlab-runner-smoke
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: /health did not respond"
          docker logs matrixlab-runner-smoke
          docker stop matrixlab-runner-smoke
          docker rm matrixlab-runner-smoke
          exit 1

      - name: Inspect manifest
        if: always()
        shell: bash
        run: |
          # sha-prefixed tag is present on every event type (push,
          # release, workflow_dispatch) so it's the safe lookup.
          echo "Inspecting sha-${SHORT_SHA}…"
          docker buildx imagetools inspect "${IMAGE}:sha-${SHORT_SHA}" || true
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Inspecting v${SEMVER}…"
            docker buildx imagetools inspect "${IMAGE}:v${SEMVER}" || true
          fi
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Inspecting latest…"
            docker buildx imagetools inspect "${IMAGE}:latest" || true
          fi

  build-sandboxes:
    name: Build & Push ${{ matrix.image }} (Docker Hub)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: matrix-lab-sandbox-utils
            context: ./sandbox-utils
            description: Shared utility image for MatrixLab sandboxes
          - image: matrix-lab-sandbox-python
            context: ./sandbox-python
            description: Python language sandbox for MatrixLab
          - image: matrix-lab-sandbox-node
            context: ./sandbox-node
            description: Node.js language sandbox for MatrixLab
          - image: matrix-lab-sandbox-go
            context: ./sandbox-go
            description: Go language sandbox for MatrixLab
          - image: matrix-lab-sandbox-rust
            context: ./sandbox-rust
            description: Rust language sandbox for MatrixLab
          - image: matrix-lab-sandbox-java
            context: ./sandbox-java
            description: Java language sandbox for MatrixLab
          - image: matrix-lab-sandbox-dotnet
            context: ./sandbox-dotnet
            description: .NET language sandbox for MatrixLab
          - image: matrix-lab-sandbox-build
            context: ./sandbox-build
            description: Build-tools sandbox for MatrixLab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive release version
        id: version
        shell: bash
        run: |
          case "${{ github.event_name }}" in
            release)
              RAW="${GITHUB_REF#refs/tags/}"
              ;;
            workflow_dispatch)
              RAW="${{ github.event.inputs.version }}"
              ;;
            push)
              # On every commit to master/main, ship a snapshot tagged
              # 0.0.0-<branch>-<sha>. Real releases / dispatches still
              # use a proper semver and move :latest.
              BRANCH="${GITHUB_REF#refs/heads/}"
              RAW="0.0.0-${BRANCH}-${GITHUB_SHA::7}"
              ;;
            *)
              RAW=""
              ;;
          esac
          if [ -z "$RAW" ]; then
            echo "Version not provided."; exit 1
          fi
          if [[ "$RAW" =~ ^v ]]; then
            RELEASE_TAG="$RAW"
            SEMVER="${RAW#v}"
          else
            RELEASE_TAG="v$RAW"
            SEMVER="$RAW"
          fi
          # Branch name (for push-only branch tag). Empty for non-push.
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "SEMVER=$SEMVER" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Compute image name (lowercase)
        id: img
        shell: bash
        run: |
          USER_RAW="${{ secrets.DOCKERHUB_USERNAME }}"
          USER_LC="${USER_RAW,,}"
          IMAGE="docker.io/${USER_LC}/${{ matrix.image }}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "Image: $IMAGE"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=v${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{version}},value=${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=semver,pattern={{major}},value=${{ env.SEMVER }},enable=${{ github.event_name != 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=sha-${{ env.SHORT_SHA }}
            type=raw,value=${{ env.BRANCH }},enable=${{ github.event_name == 'push' }}
            type=raw,value=edge,enable=${{ github.event_name == 'push' && (env.BRANCH == 'master' || env.BRANCH == 'main') }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ env.SEMVER }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}

      - name: Build & push sandbox (Docker Hub)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: ${{ github.event_name == 'push' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            BUILD_VERSION=${{ env.SEMVER }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Inspect manifest
        if: always()
        shell: bash
        run: |
          # sha-prefixed tag is present on every event type (push,
          # release, workflow_dispatch) so it's the safe lookup.
          echo "Inspecting sha-${SHORT_SHA}…"
          docker buildx imagetools inspect "${IMAGE}:sha-${SHORT_SHA}" || true
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "Inspecting v${SEMVER}…"
            docker buildx imagetools inspect "${IMAGE}:v${SEMVER}" || true
          fi
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Inspecting latest…"
            docker buildx imagetools inspect "${IMAGE}:latest" || true
          fi

  integration-test:
    name: Integration test (runner + python sandbox)
    needs: [build-runner, build-sandboxes]
    runs-on: ubuntu-latest

    steps:
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve test image tag
        shell: bash
        run: |
          # Every event publishes a sha-prefixed tag, so we can always
          # pull THIS run's images regardless of event type — push,
          # release, or workflow_dispatch.
          echo "TEST_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Pull, boot, and probe
        shell: bash
        run: |
          USER_LC="${{ secrets.DOCKERHUB_USERNAME }}"
          USER_LC="${USER_LC,,}"
          RUNNER="docker.io/${USER_LC}/matrixlab-runner:${TEST_TAG}"
          SANDBOX_PY="docker.io/${USER_LC}/matrix-lab-sandbox-python:${TEST_TAG}"

          docker pull "$RUNNER"
          docker pull "$SANDBOX_PY"

          docker run -d --name matrixlab-it \
            -p 8000:8000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "$RUNNER"

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then break; fi
            sleep 1
          done

          BODY='{"language":"python","code":"print(2+2)","timeout":30}'
          OUT="$(curl -sS -X POST http://localhost:8000/code/run \
            -H "Content-Type: application/json" -d "$BODY")"
          echo "Response: $OUT"

          docker stop matrixlab-it
          docker rm matrixlab-it

          # The previous version of this smoke test only checked that a
          # ``stdout`` field was returned — which was true even when the
          # sandbox spawn failed with ``pull access denied`` (the runner
          # still answered with a 200 + empty stdout + exit_code=125).
          # Assert the real success contract: exit_code 0 and stdout
          # containing the expected "4" so a broken namespace can't slip
          # past again.
          EXIT_CODE=$(echo "$OUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('exit_code'))")
          STDOUT=$(echo "$OUT"   | python3 -c "import sys,json; print(json.load(sys.stdin).get('stdout','').strip())")
          STDERR=$(echo "$OUT"   | python3 -c "import sys,json; print(json.load(sys.stdin).get('stderr','').strip())")

          if [ "$EXIT_CODE" != "0" ] || [ "$STDOUT" != "4" ]; then
            echo "FAIL: /code/run did not execute correctly"
            echo "      exit_code=$EXIT_CODE stdout=$STDOUT"
            echo "      stderr=$STDERR"
            exit 1
          fi
          echo "OK: /code/run smoke test passed (exit_code=0, stdout=4)"
