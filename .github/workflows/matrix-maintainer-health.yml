name: Matrix Maintainer Health Sweep

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      execute:
        description: "Execute remote /repo/run calls (false = dry-run only)"
        required: false
        default: "false"

jobs:
  maintainer-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx

      - name: Dry-run maintenance plan
        env:
          MATRIXLAB_HF_URL: ${{ secrets.MATRIXLAB_HF_URL }}
        run: |
          set -euo pipefail
          HF_URL="${MATRIXLAB_HF_URL:-http://localhost:7860}"
          python tools/matrix_maintainer.py --config configs/agent_matrix_repos.json --hf-url "$HF_URL"

      - name: Execute maintenance run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.execute == 'true' }}
        env:
          MATRIXLAB_HF_URL: ${{ secrets.MATRIXLAB_HF_URL }}
        run: |
          set -euo pipefail
          if [ -z "${MATRIXLAB_HF_URL:-}" ]; then
            echo "❌ MATRIXLAB_HF_URL secret is required for execute mode"
            exit 1
          fi
          python tools/matrix_maintainer.py --config configs/agent_matrix_repos.json --hf-url "$MATRIXLAB_HF_URL" --execute
