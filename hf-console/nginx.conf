server {
    # Hugging Face Spaces routes external traffic to the container's
    # exposed port; convention is 7860. The console is pure static
    # assets so a single server block is enough.
    listen       7860;
    server_name  _;
    server_tokens off;

    # Where the built React/Vite bundle lives.
    root /usr/share/nginx/html;
    index index.html;

    # Cache directories — must live under /tmp because the non-root
    # user nginx runs as can write there.
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Long-cache hashed assets; short-cache everything else so a fresh
    # deploy is visible to users on the next reload.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        # Single-page-app fallback — every unknown path resolves to
        # index.html so client-side routes (#dashboard, #runs, …) work.
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    # Inexpensive health probe; HF Spaces and uptime monitors hit /.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
